[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
preDeployCommand = "python manage.py migrate && if [ \"$CREATE_BOOTSTRAP_ADMIN\" = \"true\" ]; then python manage.py createsuperuser --noinput || true; python manage.py shell -c \"import os; from django.contrib.auth import get_user_model; U=get_user_model(); u=os.getenv('DJANGO_SUPERUSER_USERNAME'); e=os.getenv('DJANGO_SUPERUSER_EMAIL'); p=os.getenv('DJANGO_SUPERUSER_PASSWORD'); obj=U.objects.get(username=u); obj.email=e; obj.is_staff=True; obj.is_superuser=True; obj.role='ADMIN'; obj.set_password(p); obj.save(); print('bootstrap admin ready')\"; else echo 'bootstrap admin skipped'; fi"
healthcheckPath = "/api/v1/case-studies/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10